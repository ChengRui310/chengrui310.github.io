<div class="row mt-3">
  <div class="col">
    <div class="card border-0 shadow-sm bg-white">
      <div class="card-body p-4">
        <h5 class="mb-3">Education</h5>
        <div class="education-list">
          {% for item in site.data.profile.education %}
          <div class="education-item{% unless forloop.last %} mb-3{% endunless %}">
            <div class="education-school">{{ item.name }}</div>
            <div class="education-meta d-flex flex-column flex-md-row justify-content-between">
              <span>{{ item.position }}</span>
              <span class="text-muted">{{ item.date }}</span>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
