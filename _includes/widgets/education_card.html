<div class="row mt-3">
  <div class="col">
    <div class="card border-0 shadow-sm bg-white">
      <div class="card-body p-4">
        <h5 class="mb-3">Education</h5>
        <div class="education-list">
          {% for item in site.data.profile.education %}
          <div class="education-item{% unless forloop.last %} mb-3{% endunless %}">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-start">
              <div class="pr-md-3">
                <div class="education-school">
                  {{ item.name }}{% if item.detail and item.detail != "" %}, {{ item.detail }}{% endif %}
                </div>
                <div class="education-level text-muted">{{ item.level }}</div>
              </div>
              <div class="education-date text-muted mt-1 mt-md-0">{{ item.date }}</div>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
